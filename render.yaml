services:
  - type: web
    name: calculadora-gestion
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn calculator_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
